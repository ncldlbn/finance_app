{% extends "base.html" %}
{% block title %}Impostazioni — Finance Tracker{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Impostazioni</h1>
    <p>Configura i budget mensili per categoria</p>
</div>

<!-- Aggiungi categoria -->
<div class="card" style="margin-top:24px;max-width:480px">
    <div class="card-title" style="display:flex;align-items:center;gap:8px">
        <span class="material-icons-round" style="font-size:1rem;color:var(--accent)">add_circle_outline</span>
        Aggiungi categoria
    </div>
    <form method="POST" action="{{ url_for('impostazioni.add_category') }}">
        <div class="form-grid">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" name="name" class="form-control" placeholder="es. Abbonamenti" required>
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select name="type" class="form-control">
                    <option value="essential">Necessità</option>
                    <option value="extra">Extra</option>
                </select>
            </div>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">
                <span class="material-icons-round">save</span>Aggiungi
            </button>
        </div>
    </form>
</div>
{% endblock %}
